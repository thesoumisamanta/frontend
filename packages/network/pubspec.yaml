name: travel_diary_network
description: Production-ready network layer for Flutter applications with Dio, structured logging, interceptors, and resilient error handling.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  logger: ^2.4.0
  connectivity_plus: ^5.0.2
  meta: ^1.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.1

flutter:
  uses-material-design: false
